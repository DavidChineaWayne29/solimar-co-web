<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 52" fill="none" role="img" aria-label="Solimar&Co">
  <!-- Icon mark: Sol (sun) + Mar (sea waves) -->
  <!-- Sun -->
  <circle cx="26" cy="16" r="9" fill="#38bdf8"/>
  <!-- Wave 1 -->
  <path d="M7 34 Q16.5 26 26 34 Q35.5 42 45 34" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wave 2 (subtle) -->
  <path d="M7 43 Q16.5 35 26 43 Q35.5 51 45 43" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="59" y="36" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="24" letter-spacing="-0.4">
    <tspan fill="#ffffff">Solimar</tspan><tspan fill="#38bdf8">&amp;</tspan><tspan fill="#ffffff">Co</tspan>
  </text>
</svg>
